PRE-FILTERS:
  SOP_CLASS_FILTER:
    parameter: SOPClassUID
    include: 
      - 1.2.840.10008.5.1.4.1.1.4
      - 1.2.840.10008.5.1.4.1.1.11.1

  IMAGE_TYPE_FILTER:
    parameter: ImageType
    exclude: ["SECONDARY", "COMPOSED", "MIP", "ADC", "PROJECTION", "MPR"]

  MODALITY_FILTER:
    parameter: Modality
    include: ["MR"]

  SERIES_DESCRIPTION_FILTER:
    parameter: SeriesDescription
    exclude: ["localizer", "localizerohne BH", "Survey", "mobiview", "COMP"] # to catch composed images 

  SLICE_COUNT_FILTER:
    parameter: SliceCount
    include:
      - min: 10